name: Mobile App CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'optimus-halal/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'optimus-halal/**'
      - '.github/workflows/mobile-ci.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type to trigger'
        required: true
        type: choice
        options:
          - preview
          - production
        default: preview

defaults:
  run:
    working-directory: optimus-halal

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Typecheck & Lint ─────────────────────────────
  check:
    name: Typecheck & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          cache: pnpm
          cache-dependency-path: optimus-halal/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Install backend type dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm exec eslint .

  # ── Detect native dependency changes ──────────────
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      native: ${{ steps.filter.outputs.native }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            native:
              - 'optimus-halal/package.json'
              - 'optimus-halal/app.config.ts'
              - 'optimus-halal/eas.json'

  # ══════════════════════════════════════════════════
  # PREVIEW — Auto on push to main
  # ══════════════════════════════════════════════════

  # ── Build Preview APK (only when native files changed) ──
  eas-build-preview:
    name: Build Preview APK (Recette)
    runs-on: ubuntu-latest
    needs: [check, detect-changes]
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'preview') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.native == 'true')

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          cache: pnpm
          cache-dependency-path: optimus-halal/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: 16
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Preview APK
        run: eas build --platform android --profile preview --non-interactive --no-wait

  # ── OTA Preview (only when NO native changes) ──────
  eas-update-preview:
    name: OTA Update (Preview)
    runs-on: ubuntu-latest
    needs: [check, detect-changes]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.detect-changes.outputs.native != 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          cache: pnpm
          cache-dependency-path: optimus-halal/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: 16
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA Update (Preview)
        run: eas update --auto --non-interactive --channel preview

  # ══════════════════════════════════════════════════
  # PRODUCTION — Manual trigger only
  #
  # Smart deploy: always pushes OTA on production channel.
  # If native changes detected, ALSO builds a new store binary.
  # Fingerprint policy ensures incompatible OTAs are ignored client-side.
  # ══════════════════════════════════════════════════

  # ── OTA Production (always runs on production trigger) ──
  eas-update-production:
    name: OTA Update (Production)
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'production'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          cache: pnpm
          cache-dependency-path: optimus-halal/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: 16
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA Update (Production)
        run: eas update --auto --non-interactive --channel production

  # ── Build Production (only when native changes detected) ──
  eas-build-production:
    name: Build Production (Ship)
    runs-on: ubuntu-latest
    needs: [check, detect-changes]
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.build_type == 'production' &&
      needs.detect-changes.outputs.native == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          cache: pnpm
          cache-dependency-path: optimus-halal/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: 16
          token: ${{ secrets.EXPO_TOKEN }}

      # Android only — iOS needs Apple Distribution Certificate configured in EAS
      # To enable iOS: eas credentials --platform ios (interactive), then change to --platform all
      - name: Build Production (Android)
        run: eas build --platform android --profile production --non-interactive --no-wait
