name: Web CI

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'backend/src/**/*.ts'
      - '.github/workflows/web-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - 'backend/src/**/*.ts'
      - '.github/workflows/web-ci.yml'

defaults:
  run:
    working-directory: web

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'

      # Backend deps needed for @backend/* tRPC type resolution
      - name: Install backend dependencies
        working-directory: backend
        run: npm install --ignore-scripts

      - name: Install web dependencies
        run: npm install

      - name: Lint
        run: npx eslint

      - name: Build
        run: npx next build
        env:
          NEXT_PUBLIC_API_URL: https://api.naqiy.app
